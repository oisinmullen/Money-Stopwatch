<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — MoneyStopwatch</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Dashboard Layout ───────────────────── */
    .dash-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .dash-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    .dash-logo span { color: var(--white); }

    .dash-nav { display: flex; gap: .5rem; }
    .dash-nav a {
      padding: .45rem 1rem;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 500;
      color: var(--muted);
      transition: background .15s, color .15s;
    }
    .dash-nav a:hover, .dash-nav a.active {
      background: var(--bg3);
      color: var(--white);
    }

    .dash-main {
      padding: 2.5rem 0 5rem;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: 1fr; }
    }

    /* ── Cards ──────────────────────────────── */
    .dash-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
    }
    .dash-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }
    .dash-card-title .badge {
      font-size: .75rem;
      font-weight: 500;
      background: var(--bg3);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .15rem .65rem;
    }

    /* ── Form Elements ──────────────────────── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: .4rem;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: .6rem .85rem;
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--muted2); }
    .field select option { background: var(--bg3); }

    .field-checkbox {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem 0;
    }
    .field-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }
    .field-checkbox label {
      font-size: .875rem;
      color: var(--text);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
    }

    /* ── Rich Text Editor ───────────────────── */
    .editor-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .editor-wrap:focus-within { border-color: var(--accent); }

    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: .5rem .6rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .editor-toolbar button {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      font-family: inherit;
      padding: .3rem .55rem;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
      line-height: 1;
    }
    .editor-toolbar button:hover {
      background: var(--bg2);
      border-color: var(--border);
      color: var(--white);
    }
    .editor-toolbar button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .toolbar-sep {
      width: 1px;
      background: var(--border);
      margin: .2rem .25rem;
      align-self: stretch;
    }

    .editor-body {
      background: var(--bg3);
      min-height: 350px;
      padding: 1.1rem 1.25rem;
      color: var(--text);
      font-size: .925rem;
      line-height: 1.8;
      outline: none;
      word-break: break-word;
      caret-color: var(--accent);
    }
    .editor-body:empty::before {
      content: attr(data-placeholder);
      color: var(--muted2);
      pointer-events: none;
    }
    .editor-body h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--white);
      margin: .9rem 0 .45rem;
    }
    .editor-body h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      margin: .75rem 0 .35rem;
    }
    .editor-body p { margin-bottom: .6rem; }
    .editor-body ul, .editor-body ol {
      padding-left: 1.4rem;
      margin-bottom: .6rem;
    }
    .editor-body blockquote {
      border-left: 3px solid var(--accent);
      padding: .4rem .9rem;
      margin: .6rem 0;
      color: var(--muted);
      font-style: italic;
    }
    .editor-body a { color: var(--accent); }

    /* Blinking cursor hint for empty state */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .editor-body:empty::after {
      content: '|';
      color: var(--accent);
      animation: blink 1s step-start infinite;
    }

    .editor-meta {
      display: flex;
      justify-content: flex-end;
      padding: .4rem .85rem;
      background: var(--bg3);
      border-top: 1px solid var(--border);
    }
    .word-count {
      font-size: .75rem;
      color: var(--muted2);
    }

    /* ── Buttons ────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .6rem 1.25rem;
      border-radius: 7px;
      font-size: .875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity .15s, background .15s;
    }
    .btn:hover { opacity: .87; }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--white); opacity: 1; }
    .btn-danger {
      background: transparent;
      border: 1px solid #ef44442a;
      color: var(--red);
    }
    .btn-danger:hover { background: #ef44441a; opacity: 1; }
    .btn-sm { padding: .35rem .8rem; font-size: .8rem; }
    .btn-row {
      display: flex;
      gap: .65rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    /* ── Live Stories List ──────────────────── */
    .stories-list { list-style: none; padding: 0; margin: 0; }
    .story-item {
      display: flex;
      align-items: flex-start;
      gap: .9rem;
      padding: .85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .story-item:last-child { border-bottom: none; }

    .story-badge {
      flex-shrink: 0;
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border-radius: 4px;
      background: var(--bg3);
      color: var(--muted);
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-top: .15rem;
    }
    .story-badge.featured {
      background: #10b98120;
      border-color: #10b98140;
      color: var(--accent);
    }

    .story-info { flex: 1; min-width: 0; }
    .story-title {
      font-size: .875rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: .2rem;
    }
    .story-meta {
      font-size: .75rem;
      color: var(--muted2);
    }

    .story-actions { display: flex; gap: .35rem; flex-shrink: 0; }

    /* ── Toast ──────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--accent);
      color: #000;
      font-size: .875rem;
      font-weight: 600;
      padding: .65rem 1.25rem;
      border-radius: 8px;
      box-shadow: var(--shadow);
      transform: translateY(120%);
      opacity: 0;
      transition: transform .25s, opacity .25s;
      z-index: 9999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); color: #fff; }

    /* ── Link prompt overlay ────────────────── */
    .link-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .link-overlay.open { display: flex; }
    .link-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 380px;
      max-width: calc(100vw - 2rem);
    }
    .link-box h4 { margin-bottom: 1rem; font-size: .95rem; }
    .link-box input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: .6rem .85rem;
      outline: none;
      margin-bottom: .9rem;
    }
    .link-box input:focus { border-color: var(--accent); }
    .link-box .btn-row { margin-top: 0; }
  </style>
</head>
<body>

<!-- Dashboard Header -->
<header class="dash-header">
  <div class="container">
    <div class="dash-logo">Money<span>Stopwatch</span> <span style="color:var(--muted);font-weight:400;font-size:.85rem;">Admin</span></div>
    <nav class="dash-nav">
      <a href="#stories" class="active">Stories</a>
      <a href="../index.html" target="_blank">View Site</a>
    </nav>
  </div>
</header>

<!-- Main -->
<main class="dash-main">
  <div class="container">
    <div class="dash-grid">

      <!-- LEFT: Story Editor -->
      <div>
        <div class="dash-card">
          <div class="dash-card-title">
            <span id="editor-heading">New Story</span>
            <button class="btn btn-sm btn-ghost" id="btn-clear-form">Clear</button>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="story-title">Title</label>
              <input type="text" id="story-title" placeholder="Article title…">
            </div>
            <div class="field">
              <label for="story-category">Category</label>
              <select id="story-category">
                <option value="">Select category</option>
                <option value="Explainer">Explainer</option>
                <option value="Timeline">Timeline</option>
                <option value="Status Update">Status Update</option>
                <option value="Calculator">Calculator</option>
                <option value="Guide">Guide</option>
                <option value="News">News</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="story-excerpt">Excerpt</label>
            <textarea id="story-excerpt" rows="2" placeholder="Short summary shown on the feed…"></textarea>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="story-url">URL Path</label>
              <input type="text" id="story-url" placeholder="/feed/article-slug.html">
            </div>
            <div class="field">
              <label for="story-read-time">Read Time</label>
              <input type="text" id="story-read-time" placeholder="e.g. 5 min read">
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="story-date">Publish Date</label>
              <input type="date" id="story-date">
            </div>
            <div class="field" style="display:flex;align-items:flex-end;padding-bottom:.15rem;">
              <div class="field-checkbox">
                <input type="checkbox" id="story-featured">
                <label for="story-featured">Featured story</label>
              </div>
            </div>
          </div>

          <!-- Rich Text Editor -->
          <div class="field">
            <label>Body Content</label>
            <div class="editor-wrap">
              <div class="editor-toolbar" id="editor-toolbar">
                <button type="button" data-cmd="formatBlock" data-val="h2" title="Heading 2">H2</button>
                <button type="button" data-cmd="formatBlock" data-val="h3" title="Heading 3">H3</button>
                <div class="toolbar-sep"></div>
                <button type="button" data-cmd="bold" title="Bold"><b>B</b></button>
                <button type="button" data-cmd="italic" title="Italic"><i>I</i></button>
                <div class="toolbar-sep"></div>
                <button type="button" data-cmd="insertUnorderedList" title="Bullet List">&#8226; List</button>
                <button type="button" data-cmd="insertOrderedList" title="Numbered List">1. List</button>
                <div class="toolbar-sep"></div>
                <button type="button" id="btn-link" title="Insert Link">Link</button>
                <button type="button" data-cmd="formatBlock" data-val="blockquote" title="Blockquote">" Quote</button>
              </div>
              <div
                class="editor-body"
                id="story-editor"
                contenteditable="true"
                data-placeholder="Start writing your article here…"
                spellcheck="true"
              ></div>
              <div class="editor-meta">
                <span class="word-count" id="word-count">0 words</span>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" id="btn-save">Save Story</button>
            <button class="btn btn-ghost" id="btn-cancel-edit" style="display:none;">Cancel Edit</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Live Stories -->
      <div id="stories">
        <div class="dash-card">
          <div class="dash-card-title">
            Live Stories
            <span class="badge" id="stories-count">0</span>
          </div>
          <ul class="stories-list" id="stories-list">
            <li style="color:var(--muted2);font-size:.875rem;padding:.5rem 0;">No stories yet.</li>
          </ul>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Link Insert Overlay -->
<div class="link-overlay" id="link-overlay">
  <div class="link-box">
    <h4>Insert Link</h4>
    <input type="url" id="link-url-input" placeholder="https://…">
    <div class="btn-row">
      <button class="btn btn-primary btn-sm" id="btn-link-confirm">Insert</button>
      <button class="btn btn-ghost btn-sm" id="btn-link-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
(function () {
  'use strict';

  /* ─── Default stories seeded on first load ─── */
  const DEFAULT_STORIES = [
    {
      id: 'seed-1',
      title: 'No Tax on Overtime, Explained',
      category: 'Explainer',
      excerpt: 'What the proposal actually means, who it affects, and how much extra money it could put in your paycheck.',
      readTime: '8 min read',
      url: '/feed/no-tax-on-overtime-explained.html',
      date: '2026-04-24',
      featured: true,
      body: ''
    },
    {
      id: 'seed-2',
      title: 'When Does No Tax on Overtime Start?',
      category: 'Timeline',
      excerpt: 'The legislative timeline and the earliest realistic date overtime workers could see a change in their paychecks.',
      readTime: '7 min read',
      url: '/feed/when-does-no-tax-on-overtime-start.html',
      date: '2026-04-24',
      featured: false,
      body: ''
    },
    {
      id: 'seed-3',
      title: 'Did No Tax on Overtime Pass?',
      category: 'Status Update',
      excerpt: 'Current status of the proposal — what has been signed, what is still in debate, and what it means right now.',
      readTime: '6 min read',
      url: '/feed/did-no-tax-on-overtime-pass.html',
      date: '2026-04-24',
      featured: false,
      body: ''
    },
    {
      id: 'seed-4',
      title: 'No Tax on Overtime Calculator',
      category: 'Calculator',
      excerpt: 'Enter your hourly rate and overtime hours to see exactly how much more you would take home if overtime is tax-free.',
      readTime: '3 min read',
      url: '/feed/no-tax-on-overtime-calculator.html',
      date: '2026-04-24',
      featured: false,
      body: ''
    }
  ];

  const LS_KEY = 'ms_feed_stories';
  let stories = [];
  let editingId = null;
  let savedSelection = null;

  /* ─── LocalStorage helpers ─── */
  function loadStories() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (_) { return []; }
  }

  function saveStories() {
    localStorage.setItem(LS_KEY, JSON.stringify(stories));
  }

  function seedIfEmpty() {
    const existing = loadStories();
    if (existing.length === 0) {
      stories = DEFAULT_STORIES.map(s => ({ ...s }));
      saveStories();
    } else {
      stories = existing;
    }
  }

  /* ─── DOM refs ─── */
  const storiesList  = document.getElementById('stories-list');
  const storiesCount = document.getElementById('stories-count');
  const editorHeading = document.getElementById('editor-heading');
  const btnSave      = document.getElementById('btn-save');
  const btnClear     = document.getElementById('btn-clear-form');
  const btnCancelEdit = document.getElementById('btn-cancel-edit');
  const toast        = document.getElementById('toast');

  const fTitle    = document.getElementById('story-title');
  const fCategory = document.getElementById('story-category');
  const fExcerpt  = document.getElementById('story-excerpt');
  const fUrl      = document.getElementById('story-url');
  const fReadTime = document.getElementById('story-read-time');
  const fDate     = document.getElementById('story-date');
  const fFeatured = document.getElementById('story-featured');
  const editor    = document.getElementById('story-editor');
  const wordCount = document.getElementById('word-count');

  /* ─── Toast ─── */
  let toastTimer;
  function showToast(msg, isError) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = isError ? 'show error' : 'show';
    toastTimer = setTimeout(() => { toast.className = ''; }, 2800);
  }

  /* ─── Word count ─── */
  function updateWordCount() {
    const text = editor.innerText || '';
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    wordCount.textContent = words + (words === 1 ? ' word' : ' words');
  }

  /* ─── Rich text toolbar ─── */
  document.getElementById('editor-toolbar').addEventListener('mousedown', function (e) {
    const btn = e.target.closest('button[data-cmd]');
    if (!btn) return;
    e.preventDefault();

    const cmd = btn.dataset.cmd;
    const val = btn.dataset.val || null;
    document.execCommand(cmd, false, val);
    editor.focus();
    updateToolbarState();
  });

  /* Link button */
  const linkOverlay   = document.getElementById('link-overlay');
  const linkUrlInput  = document.getElementById('link-url-input');
  const btnLinkConfirm = document.getElementById('btn-link-confirm');
  const btnLinkCancel  = document.getElementById('btn-link-cancel');

  document.getElementById('btn-link').addEventListener('mousedown', function (e) {
    e.preventDefault();
    /* save current selection so we can restore it after overlay opens */
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
      savedSelection = sel.getRangeAt(0).cloneRange();
    }
    linkUrlInput.value = '';
    linkOverlay.classList.add('open');
    linkUrlInput.focus();
  });

  btnLinkCancel.addEventListener('click', function () {
    linkOverlay.classList.remove('open');
    savedSelection = null;
  });

  btnLinkConfirm.addEventListener('click', insertLink);
  linkUrlInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') insertLink();
    if (e.key === 'Escape') btnLinkCancel.click();
  });

  function insertLink() {
    const url = linkUrlInput.value.trim();
    if (!url) { linkOverlay.classList.remove('open'); return; }
    linkOverlay.classList.remove('open');
    editor.focus();
    if (savedSelection) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedSelection);
      savedSelection = null;
    }
    document.execCommand('createLink', false, url);
    updateToolbarState();
  }

  /* Toolbar active state */
  function updateToolbarState() {
    document.querySelectorAll('#editor-toolbar button[data-cmd]').forEach(function (btn) {
      const cmd = btn.dataset.cmd;
      const val = btn.dataset.val;
      let active = false;
      try {
        if (val) {
          active = document.queryCommandValue(cmd) === val;
        } else {
          active = document.queryCommandState(cmd);
        }
      } catch (_) {}
      btn.classList.toggle('active', active);
    });
  }

  editor.addEventListener('keyup', updateWordCount);
  editor.addEventListener('input', updateWordCount);
  editor.addEventListener('keyup', updateToolbarState);
  editor.addEventListener('mouseup', updateToolbarState);
  editor.addEventListener('selectionchange', updateToolbarState);

  /* ─── Render stories sidebar ─── */
  function renderStories() {
    storiesCount.textContent = stories.length;
    if (stories.length === 0) {
      storiesList.innerHTML = '<li style="color:var(--muted2);font-size:.875rem;padding:.5rem 0;">No stories yet.</li>';
      return;
    }
    storiesList.innerHTML = stories.map(function (s) {
      const featuredBadge = s.featured
        ? '<span class="story-badge featured">Featured</span>'
        : '<span class="story-badge">' + escHtml(s.category) + '</span>';
      return [
        '<li class="story-item">',
        featuredBadge,
        '<div class="story-info">',
        '<div class="story-title">' + escHtml(s.title) + '</div>',
        '<div class="story-meta">' + escHtml(s.date) + ' &middot; ' + escHtml(s.readTime) + '</div>',
        '</div>',
        '<div class="story-actions">',
        '<button class="btn btn-sm btn-ghost" onclick="editStory(\'' + s.id + '\')">Edit</button>',
        '<button class="btn btn-sm btn-danger" onclick="deleteStory(\'' + s.id + '\')">Del</button>',
        '</div>',
        '</li>'
      ].join('');
    }).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ─── Clear form ─── */
  function clearForm() {
    editingId = null;
    editorHeading.textContent = 'New Story';
    btnCancelEdit.style.display = 'none';
    fTitle.value    = '';
    fCategory.value = '';
    fExcerpt.value  = '';
    fUrl.value      = '';
    fReadTime.value = '';
    fDate.value     = '';
    fFeatured.checked = false;
    editor.innerHTML = '';
    updateWordCount();
  }

  /* ─── Save story ─── */
  btnSave.addEventListener('click', function () {
    const title = fTitle.value.trim();
    if (!title) { showToast('Title is required.', true); fTitle.focus(); return; }

    /* Clean up editor HTML before saving */
    const bodyHtml = cleanEditorHtml(editor.innerHTML);

    const story = {
      id:       editingId || ('s-' + Date.now()),
      title:    title,
      category: fCategory.value,
      excerpt:  fExcerpt.value.trim(),
      url:      fUrl.value.trim(),
      readTime: fReadTime.value.trim(),
      date:     fDate.value,
      featured: fFeatured.checked,
      body:     bodyHtml
    };

    if (editingId) {
      const idx = stories.findIndex(function (s) { return s.id === editingId; });
      if (idx !== -1) stories[idx] = story;
    } else {
      stories.unshift(story);
    }

    saveStories();
    renderStories();
    clearForm();
    showToast(editingId ? 'Story updated.' : 'Story saved.');
  });

  /* Clean HTML: strip empty tags, normalize whitespace */
  function cleanEditorHtml(html) {
    /* Remove contenteditable artifacts and empty paragraphs */
    return html
      .replace(/<br\s*\/?>\s*(<\/(?:p|div|h[23]|li|blockquote)>)/gi, '$1')
      .replace(/<div><br\s*\/?><\/div>/gi, '')
      .replace(/<p><br\s*\/?><\/p>/gi, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  /* ─── Edit story ─── */
  window.editStory = function (id) {
    const s = stories.find(function (x) { return x.id === id; });
    if (!s) return;
    editingId = id;
    editorHeading.textContent = 'Edit Story';
    btnCancelEdit.style.display = '';
    fTitle.value     = s.title;
    fCategory.value  = s.category;
    fExcerpt.value   = s.excerpt;
    fUrl.value       = s.url;
    fReadTime.value  = s.readTime;
    fDate.value      = s.date;
    fFeatured.checked = s.featured;
    editor.innerHTML = s.body || '';
    updateWordCount();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    fTitle.focus();
  };

  /* ─── Delete story ─── */
  window.deleteStory = function (id) {
    if (!confirm('Delete this story?')) return;
    stories = stories.filter(function (s) { return s.id !== id; });
    saveStories();
    renderStories();
    if (editingId === id) clearForm();
    showToast('Story deleted.');
  };

  /* ─── Clear / cancel buttons ─── */
  btnClear.addEventListener('click', clearForm);
  btnCancelEdit.addEventListener('click', clearForm);

  /* ─── Boot ─── */
  seedIfEmpty();
  renderStories();
  fDate.value = new Date().toISOString().slice(0, 10);

})();
</script>
</body>
</html>
