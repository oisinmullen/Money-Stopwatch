<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Admin — MoneyStopwatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      font-size: 1.25rem;
      font-weight: 800;
      color: #10b981;
      text-align: center;
      letter-spacing: -.02em;
    }
    .login-subtitle {
      text-align: center;
      font-size: .8rem;
      color: #555;
      margin-top: .25rem;
      margin-bottom: 2rem;
    }
    .login-error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 8px;
      padding: .6rem .875rem;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      color: #888;
      margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: .65rem .875rem;
      color: #fff;
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus { outline: none; border-color: #10b981; }
    .login-btn {
      width: 100%;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .login-btn:hover { background: #0ea574; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">MoneyStopwatch</div>
    <div class="login-subtitle">Feed Admin</div>
    <div class="login-error" id="login-error">Incorrect password</div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter admin password" autofocus autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Login</button>
  </div>

  <script>
  (function () {
    'use strict';
    var PASSWORD = 'MSadmin2026';
    var TOKEN_KEY = 'ms_admin_token';

    if (sessionStorage.getItem(TOKEN_KEY)) {
      window.location.replace('dashboard.html');
      return;
    }

    function attempt() {
      var val = document.getElementById('password').value;
      if (val === PASSWORD) {
        sessionStorage.setItem(TOKEN_KEY, '1');
        window.location.replace('dashboard.html');
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    document.getElementById('login-btn').addEventListener('click', attempt);
    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') attempt();
    });
  })();
  </script>
</body>
</html>
