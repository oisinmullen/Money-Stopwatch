<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Dashboard — MoneyStopwatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #10b981;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      border-radius: 6px;
      padding: .35rem .8rem;
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* Main layout */
    .admin-main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.25rem;
    }
    .admin-divider {
      border: none;
      border-top: 1px solid #222;
      margin: 2rem 0;
    }

    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 580px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      color: #888;
      margin-bottom: .4rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: .6rem .875rem;
      color: #fff;
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: #10b981; }
    .form-group select option { background: #111; }

    .featured-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }
    .featured-row input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: #10b981;
      cursor: pointer;
    }
    .featured-row label {
      font-size: .875rem;
      color: #aaa;
      cursor: pointer;
    }

    .publish-btn {
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .7rem 1.5rem;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .publish-btn:hover { background: #0ea574; }
    .publish-success {
      display: none;
      margin-top: .75rem;
      background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.2);
      color: #10b981;
      border-radius: 8px;
      padding: .6rem .875rem;
      font-size: .85rem;
    }

    /* Story cards */
    .story-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: .9rem 1.1rem;
      margin-bottom: .65rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .story-card-info { flex: 1; min-width: 0; }
    .story-card-title {
      font-weight: 700;
      font-size: .9rem;
      color: #fff;
      margin-bottom: .35rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .story-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
      font-size: .75rem;
      color: #666;
    }
    .badge-cat {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(16,185,129,.12);
      color: #10b981;
      border-radius: 4px;
      padding: .1rem .4rem;
    }
    .badge-featured {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(245,158,11,.14);
      color: #f59e0b;
      border-radius: 4px;
      padding: .1rem .4rem;
    }
    .story-card-actions { display: flex; gap: .4rem; flex-shrink: 0; }
    .action-btn {
      font-size: .72rem;
      font-family: inherit;
      font-weight: 600;
      padding: .3rem .65rem;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #333;
      background: transparent;
      color: #777;
      transition: border-color .15s, color .15s;
    }
    .action-btn:hover.btn-feature { border-color: #f59e0b; color: #f59e0b; }
    .action-btn:hover.btn-delete  { border-color: #ef4444; color: #ef4444; }
    .no-stories {
      color: #444;
      font-size: .9rem;
      text-align: center;
      padding: 2rem 0;
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="admin-header-title">The Feed — Admin</div>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>

  <div class="admin-main">

    <div class="section-title">Publish New Story</div>

    <div class="form-row">
      <div class="form-group">
        <label for="f-title">Story Title</label>
        <input type="text" id="f-title" placeholder="e.g. No Tax on Overtime Explained">
      </div>
      <div class="form-group">
        <label for="f-category">Category</label>
        <select id="f-category">
          <option value="Explainer">Explainer</option>
          <option value="Timeline">Timeline</option>
          <option value="Calculator">Calculator</option>
          <option value="News">News</option>
          <option value="Guide">Guide</option>
          <option value="Trending">Trending</option>
          <option value="Status Update">Status Update</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="f-excerpt">Excerpt (1–2 sentences)</label>
      <textarea id="f-excerpt" placeholder="Brief description shown in the feed card..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="f-readtime">Read Time</label>
        <input type="text" id="f-readtime" placeholder="e.g. 5 min read">
      </div>
      <div class="form-group">
        <label for="f-date">Date</label>
        <input type="date" id="f-date">
      </div>
    </div>

    <div class="form-group">
      <label for="f-url">Article URL</label>
      <input type="text" id="f-url" placeholder="e.g. /feed/no-tax-on-overtime-explained.html">
    </div>

    <div class="featured-row">
      <input type="checkbox" id="f-featured">
      <label for="f-featured">Feature this story (appears in the trending banner)</label>
    </div>

    <button class="publish-btn" id="publish-btn">Publish Story</button>
    <div class="publish-success" id="publish-success">Story published successfully.</div>

    <hr class="admin-divider">

    <div class="section-title">Live Stories</div>
    <div id="stories-list"></div>

  </div>

  <script>
  (function () {
    'use strict';
    var TOKEN_KEY = 'ms_admin_token';
    var STORE_KEY = 'feed_stories';

    if (!sessionStorage.getItem(TOKEN_KEY)) {
      window.location.replace('index.html');
      return;
    }

    document.getElementById('logout-btn').addEventListener('click', function () {
      sessionStorage.removeItem(TOKEN_KEY);
      window.location.replace('index.html');
    });

    // Default date input to today
    document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

    function getStories() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch (e) { return []; }
    }
    function saveStories(arr) { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmtDate(iso) {
      var d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function renderStories() {
      var list = document.getElementById('stories-list');
      var stories = getStories().slice().sort(function (a, b) { return b.id - a.id; });
      if (!stories.length) {
        list.innerHTML = '<div class="no-stories">No stories published yet.</div>';
        return;
      }
      list.innerHTML = stories.map(function (s) {
        return '<div class="story-card">' +
          '<div class="story-card-info">' +
            '<div class="story-card-title">' + esc(s.title) + '</div>' +
            '<div class="story-card-meta">' +
              '<span class="badge-cat">' + esc(s.category) + '</span>' +
              '<span>' + esc(fmtDate(s.date)) + '</span>' +
              (s.featured ? '<span class="badge-featured">Featured</span>' : '') +
              (s.readTime ? '<span>' + esc(s.readTime) + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="story-card-actions">' +
            '<button class="action-btn btn-feature" data-action="feature" data-id="' + s.id + '">Set as Featured</button>' +
            '<button class="action-btn btn-delete"  data-action="delete"  data-id="' + s.id + '">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    document.getElementById('publish-btn').addEventListener('click', function () {
      var title    = document.getElementById('f-title').value.trim();
      var category = document.getElementById('f-category').value;
      var excerpt  = document.getElementById('f-excerpt').value.trim();
      var readTime = document.getElementById('f-readtime').value.trim();
      var url      = document.getElementById('f-url').value.trim();
      var featured = document.getElementById('f-featured').checked;
      var date     = document.getElementById('f-date').value;

      if (!title || !excerpt || !url || !date) return;

      var stories = getStories();
      if (featured) {
        stories = stories.map(function (s) { return Object.assign({}, s, { featured: false }); });
      }
      stories.push({ id: Date.now(), title: title, category: category, excerpt: excerpt, readTime: readTime, url: url, featured: featured, date: date });
      saveStories(stories);

      document.getElementById('f-title').value   = '';
      document.getElementById('f-excerpt').value = '';
      document.getElementById('f-readtime').value = '';
      document.getElementById('f-url').value     = '';
      document.getElementById('f-featured').checked = false;
      document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

      var ok = document.getElementById('publish-success');
      ok.style.display = 'block';
      setTimeout(function () { ok.style.display = 'none'; }, 2500);

      renderStories();
    });

    document.getElementById('stories-list').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      var id     = parseInt(btn.dataset.id, 10);
      var stories = getStories();

      if (action === 'delete') {
        if (!confirm('Delete this story?')) return;
        saveStories(stories.filter(function (s) { return s.id !== id; }));
      } else if (action === 'feature') {
        saveStories(stories.map(function (s) { return Object.assign({}, s, { featured: s.id === id }); }));
      }
      renderStories();
    });

    renderStories();
  })();
  </script>
</body>
</html>
