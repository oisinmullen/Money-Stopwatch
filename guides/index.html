  <link rel="stylesheet" href="../css/style.css">
  <style>
    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #6b7280;
      margin-bottom: .75rem;
    }
    .section-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 2.5rem 0;
    }

    /* Premium Bundle Cards */
    .bundles-grid {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .bundle-card {
      background: #1a1a1a;
      border: 1px solid #f59e0b;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .bundle-card { flex-direction: column; align-items: flex-start; }
    }
    .bundle-cover {
      width: 120px;
      height: 160px;
      flex-shrink: 0;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .bundle-cover img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .bundle-cover-placeholder {
      width: 100%;
      height: 100%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: .75rem;
      font-weight: 600;
      text-align: center;
      padding: .5rem;
    }
    .bundle-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .bundle-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
    }
    .bundle-desc {
      font-size: .875rem;
      color: #9ca3af;
      line-height: 1.6;
    }
    .bundle-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: .5rem;
    }
    .bundle-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f59e0b;
    }
    .bundle-btn {
      display: inline-block;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 7px;
      padding: .55rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity .15s;
    }
    .bundle-btn:hover { opacity: .87; }

    /* Email capture */
    .email-banner {
      background: #0d1f18;
      border: 1px solid #10b981;
      border-radius: 12px;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }
    @media (max-width: 720px) {
      .email-banner { flex-direction: column; align-items: flex-start; padding: 20px; }
    }
    .email-banner-text h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .35rem;
    }
    .email-banner-text p {
      font-size: .85rem;
      color: #9ca3af;
      line-height: 1.5;
    }
    .email-form {
      display: flex;
      gap: .5rem;
      flex-shrink: 0;
    }
    @media (max-width: 720px) {
      .email-form { width: 100%; }
      .email-form input { flex: 1; }
    }
    .email-form input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      color: #fff;
      font-family: inherit;
      font-size: .88rem;
      padding: .55rem .8rem;
      outline: none;
      width: 240px;
      transition: border-color .15s;
    }
    .email-form input:focus { border-color: #10b981; }
    .email-form input::placeholder { color: #6b7280; }
    .email-form button {
      background: #10b981;
      color: #000;
      border: none;
      border-radius: 7px;
      padding: .55rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .email-form button:hover { opacity: .87; }
    .email-msg {
      font-size: .85rem;
      font-weight: 600;
      margin-top: .25rem;
    }
    .email-msg.success { color: #10b981; }
    .email-msg.error { color: #ef4444; }

    /* Regular guides grid */
    .guides-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      .guides-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .guides-grid { grid-template-columns: 1fr; }
    }
    .guide-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: border-color .15s;
    }
    .guide-card:hover { border-color: #10b981; }
    .guide-card-cat {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #10b981;
    }
    .guide-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
    }
    .guide-card-desc {
      font-size: .85rem;
      color: #9ca3af;
      line-height: 1.55;
      flex: 1;
    }
    .guide-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: .5rem;
    }
    .guide-card-price {
      font-size: 1.05rem;
      font-weight: 700;
      color: #10b981;
    }
    .guide-card-btn {
      display: inline-block;
      background: #10b981;
      color: #000;
      border: none;
      border-radius: 7px;
      padding: .5rem 1rem;
      font-size: .82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity .15s;
    }
    .guide-card-btn:hover { opacity: .87; }
    .guide-card-btn.disabled {
      opacity: .5;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="site-header-slot"></div>

<main class="main-content">
  <div class="container">

    <div class="page-hero">
      <h1>Money <span class="hero-accent">Guides</span></h1>
      <p>Premium step-by-step guides to help you keep more of what you earn.</p>
    </div>

    <!-- Premium Bundles -->
    <div id="bundles-section"></div>

    <hr class="section-divider" id="divider-bundles" style="display:none;">

    <!-- Email Capture -->
    <div class="email-banner" id="email-banner">
      <div class="email-banner-text">
        <h3>Get a free budgeting checklist</h3>
        <p>Join readers getting free money guides and financial tips.</p>
      </div>
      <div>
        <form class="email-form" id="email-form">
          <input type="email" name="email" placeholder="you@email.com" required>
          <button type="submit">Send Me the Checklist</button>
        </form>
        <div class="email-msg" id="email-msg" style="display:none;"></div>
      </div>
    </div>

    <hr class="section-divider">

    <!-- All Guides -->
    <div class="section-label">ALL GUIDES</div>
    <div class="guides-grid" id="guides-grid"></div>

  </div>
</main>

<div id="site-footer-slot"></div>

<script src="../js/components.js"></script>
<script>
(function () {
  'use strict';

  var LS_KEY = 'ms_pdf_products';

  var DEFAULTS = [
    { id:'g-1', title:'Budgeting in Everyday Life', description:'Save money, reduce financial stress and achieve your financial goals. A complete practical guide.', price:'$7', image:'', url:'#', category:'GUIDE', featured:true },
    { id:'g-2', title:'Salary Negotiation Script Pack', description:'Word-for-word scripts to negotiate your salary with confidence and get paid what you\'re worth.', price:'$9', image:'', url:'#', category:'GUIDE', featured:true },
    { id:'g-3', title:"No Tax on Overtime — Worker's Claim Guide", description:'Everything you need to know to claim your overtime tax deduction under the One Big Beautiful Bill Act.', price:'$7', image:'', url:'#', category:'GUIDE', featured:true },
    { id:'g-4', title:'How to Read Your Pay Stub', description:'Understand every line on your paycheck so you never miss an error.', price:'$7', image:'', url:'#', category:'GUIDE', featured:false },
    { id:'g-5', title:'Side Income Starter Kit', description:'Proven ways to earn an extra $500-$2,000 per month outside your day job.', price:'$9', image:'', url:'#', category:'GUIDE', featured:false },
    { id:'g-6', title:'Emergency Fund Blueprint', description:'Build a 3-month safety net on any income with this week-by-week savings plan.', price:'$7', image:'', url:'#', category:'CHECKLIST', featured:false },
    { id:'g-7', title:'Tax Deductions You\'re Missing', description:'The most overlooked deductions for W-2 employees and 1099 workers.', price:'$9', image:'', url:'#', category:'GUIDE', featured:false },
    { id:'g-8', title:'First-Time Home Buyer Checklist', description:'Every step from pre-approval to closing day, with cost breakdowns.', price:'$9', image:'', url:'#', category:'CHECKLIST', featured:false },
    { id:'g-9', title:'Debt Payoff Accelerator', description:'Snowball vs avalanche — find the fastest path to zero debt for your situation.', price:'$7', image:'', url:'#', category:'GUIDE', featured:false }
  ];

  function load() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return [];
      var parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (_) { return []; }
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function buildBundleCard(p) {
    var hasImage = p.image && p.image.trim();
    var imgHTML = hasImage
      ? '<img src="' + esc(p.image) + '" alt="' + esc(p.title) + '">'
      : '<div class="bundle-cover-placeholder">Cover Coming Soon</div>';
    var hasUrl = p.url && p.url.trim();
    var btnHTML = hasUrl
      ? '<a href="' + esc(p.url) + '" class="bundle-btn" target="_blank" rel="noopener">Get This Guide</a>'
      : '<span class="bundle-btn" style="opacity:.5;pointer-events:none;">Get This Guide</span>';

    return '<div class="bundle-card">' +
      '<div class="bundle-cover">' + imgHTML + '</div>' +
      '<div class="bundle-body">' +
      '<div class="bundle-title">' + esc(p.title) + '</div>' +
      '<div class="bundle-desc">' + esc(p.description) + '</div>' +
      '<div class="bundle-footer"><span class="bundle-price">' + esc(p.price) + '</span>' + btnHTML + '</div>' +
      '</div></div>';
  }

  function buildGuideCard(p) {
    var hasUrl = p.url && p.url.trim();
    var btnHTML = hasUrl
      ? '<a href="' + esc(p.url) + '" class="guide-card-btn" target="_blank" rel="noopener">Get This Guide</a>'
      : '<span class="guide-card-btn disabled">Get This Guide</span>';

    return '<div class="guide-card">' +
      '<div class="guide-card-cat">' + esc(p.category || 'Guide') + '</div>' +
      '<div class="guide-card-title">' + esc(p.title) + '</div>' +
      '<div class="guide-card-desc">' + esc(p.description) + '</div>' +
      '<div class="guide-card-footer"><span class="guide-card-price">' + esc(p.price) + '</span>' + btnHTML + '</div>' +
      '</div>';
  }

  var products = load();
  if (products.length === 0) products = DEFAULTS;

  var featured = products.filter(function(p) { return p.featured; })
    .sort(function(a, b) { return (b.id || '').localeCompare(a.id || ''); })
    .slice(0, 3);

  var bundlesSection = document.getElementById('bundles-section');
  if (featured.length > 0) {
    bundlesSection.innerHTML =
      '<div class="section-label">PREMIUM BUNDLES</div>' +
      '<div class="bundles-grid">' + featured.map(buildBundleCard).join('') + '</div>';
    document.getElementById('divider-bundles').style.display = '';
  }

  document.getElementById('guides-grid').innerHTML = products.map(buildGuideCard).join('');

  /* Email form */
  var emailForm = document.getElementById('email-form');
  var emailMsg = document.getElementById('email-msg');
  emailForm.addEventListener('submit', function (e) {
    e.preventDefault();
    var data = new FormData(emailForm);
    fetch('https://formspree.io/f/xgojokll', {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(function (res) {
      if (res.ok) {
        emailForm.style.display = 'none';
        emailMsg.style.display = '';
        emailMsg.className = 'email-msg success';
        emailMsg.textContent = 'Checklist on its way — check your inbox.';
      } else {
        emailMsg.style.display = '';
        emailMsg.className = 'email-msg error';
        emailMsg.textContent = 'Something went wrong — try again.';
      }
    }).catch(function () {
      emailMsg.style.display = '';
      emailMsg.className = 'email-msg error';
      emailMsg.textContent = 'Something went wrong — try again.';
    });
  });
})();
</script>
</body>
</html>
